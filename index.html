<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>professional feedback · website demo</title>
  <style>
    /* === RESET & MODERN BASE === */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f0f4fa;
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      color: #1e2b3c;
    }

    /* main glossy card */
    .form-card {
      max-width: 960px;
      width: 100%;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(2px);
      border-radius: 2.5rem;
      box-shadow: 0 25px 45px -15px rgba(18, 35, 60, 0.25),
                  0 8px 20px -8px rgba(0, 20, 40, 0.15);
      padding: 2.8rem 2.5rem;
      border: 1px solid rgba(255, 255, 255, 0.5);
      transition: box-shadow 0.25s;
      position: relative;
    }

    /* header area – subtle gradient */
    .form-header {
      margin-bottom: 2.5rem;
      text-align: center;
    }

    .form-header h1 {
      font-size: 2.2rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      background: linear-gradient(150deg, #1c3a5c, #2b4c73);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }

    .form-header p {
      font-size: 1.1rem;
      color: #446688;
      max-width: 650px;
      margin: 0 auto;
      font-weight: 400;
      background: rgba(230, 241, 250, 0.7);
      display: inline-block;
      padding: 0.4rem 2rem;
      border-radius: 60px;
      backdrop-filter: blur(4px);
      box-shadow: 0 2px 6px rgba(0,0,0,0.02);
    }

    /* sections with soft dividers */
    .form-section {
      margin-bottom: 2.2rem;
      padding-bottom: 2rem;
      border-bottom: 2px dashed #dde5ef;
    }

    .form-section:last-of-type {
      border-bottom: none;
      padding-bottom: 0;
    }

    /* field styling */
    .field-group {
      margin-bottom: 1.8rem;
    }

    label {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      font-weight: 520;
      font-size: 1rem;
      margin-bottom: 0.45rem;
      color: #1d3d5c;
    }

    label .hint {
      font-weight: 400;
      font-size: 0.85rem;
      color: #5f7d9c;
      margin-left: 0.3rem;
    }

    input, select, textarea {
      width: 100%;
      padding: 0.85rem 1.2rem;
      font-size: 1rem;
      font-family: inherit;
      border: 1px solid #cbd6e4;
      border-radius: 22px;
      background: #ffffff;
      transition: 0.2s;
      box-shadow: 0 4px 10px -2px rgba(0, 20, 30, 0.04);
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #3f82b0;
      box-shadow: 0 0 0 4px rgba(55, 114, 170, 0.12), 0 4px 12px rgba(0,0,0,0.02);
    }

    textarea {
      resize: vertical;
      min-height: 95px;
      border-radius: 24px;
    }

    /* inline radio block – pill style */
    .radio-group {
      display: flex;
      flex-wrap: wrap;
      gap: 2.2rem;
      background: #f5faff;
      padding: 1rem 1.8rem;
      border-radius: 50px;
      border: 1px solid #d3e2f2;
      margin-top: 0.4rem;
    }

    .radio-group label {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: 480;
      color: #1f4465;
      cursor: pointer;
      margin-bottom: 0;
    }

    .radio-group input[type="radio"] {
      width: 1.2rem;
      height: 1.2rem;
      accent-color: #2b6a9e;
      margin: 0;
      box-shadow: none;
    }

    /* custom select arrow */
    select {
      appearance: none;
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="%23365e86" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>');
      background-repeat: no-repeat;
      background-position: right 1.3rem center;
      background-size: 1.2rem;
    }

    /* submit button – smooth */
    .submit-btn {
      background: #1f3f5c;
      color: white;
      border: none;
      padding: 1.1rem 2rem;
      font-size: 1.25rem;
      font-weight: 580;
      border-radius: 60px;
      width: 100%;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 12px 22px -12px #1f3f5c80;
      letter-spacing: 0.3px;
      margin: 1rem 0 0.5rem;
      border: 1px solid #ffffff30;
    }

    .submit-btn:hover {
      background: #27537a;
      transform: scale(1.01);
      box-shadow: 0 18px 28px -12px #1d3e60;
    }

    .submit-btn:active {
      transform: scale(0.98);
    }

    .submit-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* === GREEN TOAST (pop‑up) – enhanced === */
    .toast-success {
      visibility: hidden;
      min-width: 300px;
      background: #1b8c5e;
      color: #f1fcf5;
      text-align: center;
      padding: 1rem 2.2rem;
      border-radius: 60px;
      font-size: 1.2rem;
      font-weight: 520;
      box-shadow: 0 20px 35px -10px #0a4d2e;
      border-left: 6px solid #b0f0c0;
      backdrop-filter: blur(6px);
      position: sticky;
      bottom: 1.5rem;
      margin: 1.5rem auto 0;
      width: fit-content;
      transition: visibility 0.2s, opacity 0.2s, transform 0.2s;
      opacity: 0;
      transform: scale(0.9);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
    }

    .toast-success.show {
      visibility: visible;
      opacity: 1;
      transform: scale(1);
    }

    .toast-success::before {
      content: "✅";
      font-size: 1.4rem;
      filter: drop-shadow(0 2px 2px rgba(0,0,0,0.1));
    }

    /* divider line for extra rhythm */
    hr {
      border: none;
      border-top: 2px dotted #c5d7ea;
      margin: 2rem 0 1.2rem;
    }

    /* responsive */
    @media (max-width: 600px) {
      .form-card { padding: 2rem 1.2rem; }
      .radio-group { gap: 1.2rem; padding: 0.8rem 1rem; }
      .form-header h1 { font-size: 1.9rem; }
      .toast-success { min-width: 260px; font-size: 1rem; }
    }
  </style>
</head>
<body>
  <div class="form-card" id="formCard">
    <!-- header -->
    <div class="form-header">
      <h1>✨ Your feedback · website demo</h1>
      <p>Ten quick questions to shape your perfect web presence</p>
    </div>

    <!-- NETLIFY FORM (name + data-netlify) -->
    <form 
      id="feedbackForm"
      method="POST" 
      data-netlify="true" 
      data-netlify-honeypot="bot-field"
      name="feedback-form"
    >
      <!-- necessary hidden fields -->
      <input type="hidden" name="form-name" value="feedback-form" />
      <input type="hidden" name="bot-field" aria-hidden="true" style="display: none;" />

      <!-- SECTION 1: CONTACT BASICS -->
      <div class="form-section">
        <div class="field-group">
          <label for="clientName">👤 Full name</label>
          <input type="text" id="clientName" name="clientName" placeholder="e.g. Morgan Chen" />
        </div>

        <div class="field-group">
          <label for="businessName">🏢 Business name</label>
          <input type="text" id="businessName" name="businessName" placeholder="e.g. Chen's patisserie" />
        </div>

        <div class="field-group">
          <label for="email">📧 Email address</label>
          <input type="email" id="email" name="email" placeholder="hello@business.com" />
        </div>

        <!-- phone field (extra contact) -->
        <div class="field-group">
          <label for="phone">📞 Phone number <span class="hint">(optional)</span></label>
          <input type="tel" id="phone" name="phone" placeholder="+1 (555) 123-4567" />
        </div>
      </div>

      <!-- SECTION 2: FIRST IMPRESSION & TRUST (questions 1–3) -->
      <div class="form-section">
        <div class="field-group">
          <label for="firstImpression">1. What was your honest first impression when you saw the demo website for your business?</label>
          <textarea id="firstImpression" name="firstImpression" placeholder="e.g. modern, clean, professional, or any immediate thoughts..."></textarea>
        </div>

        <div class="field-group">
          <label for="professionalRating">2. Compared to your current online presence (or lack of one), how much more professional does the demo website make your business look? <span class="hint">(1 = not at all, 10 = extremely)</span></label>
          <select id="professionalRating" name="professionalRating">
            <option value="" disabled selected>– select rating –</option>
            <option value="1">1 – not at all</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5 – moderately</option>
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8">8</option>
            <option value="9">9</option>
            <option value="10">10 – extremely professional</option>
          </select>
        </div>

        <div class="field-group">
          <label for="trustEffect">3. If a potential customer discovered your business through this website, how do you think it would affect their trust in your company?</label>
          <textarea id="trustEffect" name="trustEffect" placeholder="e.g. they'd see us as more credible, established..."></textarea>
        </div>
      </div>

      <!-- SECTION 3: INTERACTION & STANDOUT (questions 4–6) -->
      <div class="form-section">
        <div class="field-group">
          <label for="customerInteraction">4. Can you imagine how this website might change the way customers interact with your business online?</label>
          <textarea id="customerInteraction" name="customerInteraction" placeholder="e.g. easier contact, more engagement, clearer message..."></textarea>
        </div>

        <div class="field-group">
          <label for="stoodOut">5. What part of the demo website stood out to you the most?</label>
          <textarea id="stoodOut" name="stoodOut" placeholder="e.g. layout, colors, simplicity, responsiveness..."></textarea>
        </div>

        <div class="field-group">
          <label for="changes">6. Is there anything you would change or add to make this website perfect for your business?</label>
          <textarea id="changes" name="changes" placeholder="Adjustments, features, or content you'd love to see..."></textarea>
        </div>
      </div>

      <!-- SECTION 4: IMPORTANCE & VALUE (questions 7–8) -->
      <div class="form-section">
        <div class="field-group">
          <label for="importanceRating">7. How important is having a strong online presence for your business growth this year? <span class="hint">(1 = low, 10 = critical)</span></label>
          <select id="importanceRating" name="importanceRating">
            <option value="" disabled selected>– select rating –</option>
            <option value="1">1 – not important</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5 – moderately</option>
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8">8</option>
            <option value="9">9</option>
            <option value="10">10 – absolutely critical</option>
          </select>
        </div>

        <div class="field-group">
          <label for="valuableCustomers">8. If a website like this helped you attract even a few more customers each month, how valuable would that be for your business?</label>
          <textarea id="valuableCustomers" name="valuableCustomers" placeholder="e.g. transformative, huge impact, nice boost..."></textarea>
        </div>
      </div>

      <!-- SECTION 5: DECISION & SUPPORT (questions 9–10) -->
      <div class="form-section">
        <div class="field-group">
          <label>9. Would having someone handle the design, updates, and technical side of your website make things easier for you?</label>
          <div class="radio-group">
            <label><input type="radio" name="handleDesign" value="Yes" /> Yes</label>
            <label><input type="radio" name="handleDesign" value="No" /> No</label>
          </div>
        </div>

        <div class="field-group">
          <label>10. If this website was fully customized for your business and ready to launch, would you be open to moving forward with it?</label>
          <div class="radio-group">
            <label><input type="radio" name="openToMove" value="Yes" /> Yes</label>
            <label><input type="radio" name="openToMove" value="No" /> No</label>
            <label><input type="radio" name="openToMove" value="Maybe" /> Maybe</label>
          </div>
        </div>
      </div>

      <!-- soft hr + submit -->
      <hr />
      <button type="submit" class="submit-btn" id="submitBtn">📬 Send feedback</button>
    </form>

    <!-- GREEN POP‑UP TOAST (hidden initially) -->
    <div id="successToast" class="toast-success" role="status" aria-live="polite">
      Thank you for your feedback!
    </div>
  </div>

  <script>
    (function() {
      const form = document.getElementById('feedbackForm');
      const toast = document.getElementById('successToast');
      const submitBtn = document.getElementById('submitBtn');
      let toastTimer = null;

      if (!form) return;

      form.addEventListener('submit', async function(e) {
        e.preventDefault();   // stop native form POST

        // Disable button to prevent double submission
        submitBtn.disabled = true;
        submitBtn.textContent = '📬 Sending...';

        // Collect form data
        const formData = new FormData(form);
        const urlEncoded = new URLSearchParams(formData).toString();

        try {
          // Use current page URL instead of '/' to ensure correct Netlify endpoint
          const response = await fetch(window.location.href, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/x-www-form-urlencoded',
            },
            body: urlEncoded,
          });

          if (response.ok) {
            // --- GREEN TOAST POPUP ---
            toast.classList.add('show');

            // Reset form fields (user-friendly)
            form.reset();

            // Hide toast after 3.5 seconds
            if (toastTimer) clearTimeout(toastTimer);
            toastTimer = setTimeout(() => {
              toast.classList.remove('show');
            }, 3500);
          } else {
            // Submission failed but request went through
            alert('Submission failed. Please try again or contact us directly.');
          }
        } catch (error) {
          // Network error
          alert('Network error – please check your connection.');
          console.error(error);
        } finally {
          // Re-enable button
          submitBtn.disabled = false;
          submitBtn.textContent = '📬 Send feedback';
        }
      });
    })();
  </script>

  <!-- no additional frameworks, pure HTML/CSS/JS, netlify ready -->
  <!-- phone field kept, all 10 questions exactly as provided, green popup enhanced -->
</body>
</html>
